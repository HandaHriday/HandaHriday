name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"        # auto-refresh once a day
  workflow_dispatch:            # lets you run it by hand
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#4169E1&color_dots=#ebedf0,#b3c7f7,#7aa2ff,#4169E1,#1a3fb0
            dist/snake-dark.svg?palette=github-dark&color_snake=#5b9bff&color_dots=#161b22,#1d3a6e,#2d5bb5,#3f7be0,#5b9bff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
